repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3
        additional_dependencies: []

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        files: ^(src/|include/|examples/|main.c|Makefile|CMakeLists.txt)
        args: ["-style=file"]

  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm
        files: ^(docs/.*\.md|README\.md)$

  - repo: local
    hooks:
      - id: cml-build
        name: Build C-ML
        entry: make -j
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
      - id: pytest
        name: Run pytest
        entry: bash -c 'pytest -q -p no:asyncio tests/'
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
