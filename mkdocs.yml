site_name: C-ML Documentation
site_description: Production-ready Machine Learning Library in C
repo_url: https://github.com/jaywyawhare/C-ML
repo_name: jaywyawhare/C-ML
site_author: Arrry
copyright: Copyright &copy; 2025 C-ML Contributors

# Explicitly select Pygments styles for syntax highlighting
pygments_style: monokai
pygments_dark_style: native

theme:
  name: material
  logo: light-mode.svg
  favicon: light-mode.svg
  palette:
    - media: "(prefers-color-scheme)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: "Roboto"
    code: "Source Code Pro"
  icon:
    logo: logo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share

extra_css:
  - docs/extra.css

extra_javascript:
  - docs/logo-switcher.js

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - API Reference: api_reference.md
  - Autograd: autograd.md
  - Neural Network Layers: nn_layers.md
  - Training: training.md
  - Graph Mode: graph_mode.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jaywyawhare/C-ML

markdown_extensions:
  - toc
  - tables
  - admonition
  - codehilite:
      guess_lang: false
      linenums: false
  - pymdownx.highlight:
      use_pygments: true
      linenums: false
      anchor_linenums: false
      default_lang: c
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.tilde
