site_name: Documentation
site_description: Lightweight Machine Learning Library in C
repo_url: https://github.com/jaywyawhare/C-ML
site_author: Arrry

# Explicitly select Pygments styles for syntax highlighting
pygments_style: monokai
pygments_dark_style: native

theme:
  name: material
  logo: image.svg
  favicon: image.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: "Roboto"
    code: "Source Code Pro"
  icon:
    logo: logo

nav:
  - Home: index.md
  - Autograd: AUTOGRAD.md
  - Autograd Implementation: AUTOGRAD_IMPLEMENTATION.md
  - Layers Reference: NN_LAYERS.md
  - Layers Implementation: LAYERS_COMPLETE.md
  - Training Guide: TRAINING.md
  - Integration Summary: INTEGRATION_SUMMARY.md
  - Implementation Status: IMPLEMENTATION_STATUS.md
  - TODO / Roadmap: TODO_IMPLEMENTATIONS.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jaywyawhare/C-ML

markdown_extensions:
  - toc
  - tables
  - admonition
  - codehilite:
      guess_lang: false
      linenums: false
  - pymdownx.highlight:
      use_pygments: true
      linenums: false
      anchor_linenums: false
      default_lang: c
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.emoji
  - pymdownx.tasklist
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.tilde
