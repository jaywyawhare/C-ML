name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test deps (pre-commit, PyTorch CPU, pytest, numpy)
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit pytest numpy
          pip install --extra-index-url https://download.pytorch.org/whl/cpu torch

      - name: Run pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure

      - name: Build C-ML (Makefile)
        run: |
          make clean && make -j$(nproc)

      - name: Run pytest
        run: |
          pytest -q

  cmake-build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests
        run: cd build && ctest --output-on-failure

  gpu-simulation-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DBUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run GPU simulation test
        run: |
          if [ -f build/bin/test_multi_gpu ]; then
            DEVICE_SIM_GPU=1 ./build/bin/test_multi_gpu
          else
            echo "test_multi_gpu not found, skipping"
          fi

  # gpu-test:
  #   runs-on: [self-hosted, gpu]
  #   steps:
  #     - name: Checkout
  #       uses: actions/checkout@v4
  #     - name: Configure CMake with GPU
  #       run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON -DENABLE_OPENCL=ON
  #     - name: Build
  #       run: cmake --build build -j$(nproc)
  #     - name: Run GPU tests
  #       run: cd build && ctest --output-on-failure -L gpu

  deploy:
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/cache@v4
        with:
          key: ${{ github.ref }}
          path: .cache
      - run: pip install mkdocs mkdocs-material pillow cairosvg
      - run: mkdocs gh-deploy --force
